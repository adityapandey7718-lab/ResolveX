services:
  - type: web
    name: resolve-x
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FIREBASE_CREDENTIALS_PATH
        value: firebase_credentials.json
      # Add other environment variables here or in the Render dashboard
