<!DOCTYPE html>
<html>
<head>
    <title>ResolveX - AI Support</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <h1>ResolveX - Intelligent Support System</h1>

        <form id="chatForm">
            <textarea id="message" placeholder="Describe your issue..." required></textarea>
            <button type="submit">Send</button>
        </form>

        <div id="result" class="hidden">
            <h3>AI Response</h3>
            <p><strong>Intent:</strong> <span id="intent"></span></p>
            <p id="response"></p>

            <div id="feedback">
                <p>Was this helpful?</p>
                <button onclick="sendFeedback(true)">👍 Yes</button>
                <button onclick="sendFeedback(false)">👎 No</button>
            </div>
        </div>
    </div>

<script src="/static/main.js"></script>
</body>
</html>
