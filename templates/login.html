<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - ResolveX</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back 👋</h2>
            <p class="auth-subtitle">Login to continue to ResolveX</p>

            <!-- Email/Password Login Form -->
            <div id="emailLoginForm">
                <input type="email" id="loginEmail" placeholder="Email" required style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <input type="password" id="loginPassword" placeholder="Password" required style="width: 100%; margin-bottom: 15px; padding: 10px; border-radius: 5px; border: 1px solid #ddd;">
                <button id="emailLoginBtn" class="btn btn-primary" style="width: 100%; margin-bottom: 15px;">Login with Email</button>
            </div>

            <div style="text-align: center; margin-bottom: 15px; color: #777;">OR</div>

            <!-- Google Sign-In Button -->
            <button id="googleSignInBtn" class="btn btn-primary" style="background-color: #4285F4; border-color: #4285F4; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
            
            <div id="loginError" style="color: red; margin-top: 15px; display: none; text-align: center;"></div>

            <p class="auth-switch" style="margin-top: 20px; text-align: center;">
                Don't have an account?
                <a href="/signup">Sign Up</a>
            </p>

        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "{{ firebase_config.apiKey }}",
            authDomain: "{{ firebase_config.authDomain }}",
            projectId: "{{ firebase_config.projectId }}",
            storageBucket: "{{ firebase_config.storageBucket }}",
            messagingSenderId: "{{ firebase_config.messagingSenderId }}",
            appId: "{{ firebase_config.appId }}"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const handleAuthResponse = async (user) => {
            const idToken = await user.getIdToken();
            const response = await fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ idToken: idToken })
            });
            const data = await response.json();
            if (data.success) {
                window.location.href = '/';
            } else {
                throw new Error(data.error || "Login failed on server");
            }
        };

        const showError = (msg) => {
            const errorDiv = document.getElementById('loginError');
            errorDiv.innerText = msg;
            errorDiv.style.display = "block";
        };

        // Email Login
        document.getElementById('emailLoginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('emailLoginBtn');
            
            if(!email || !pass) return showError("Please enter email and password");

            btn.disabled = true;
            btn.innerText = "Logging in...";
            
            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                await handleAuthResponse(userCredential.user);
            } catch (error) {
                showError("Login failed: " + error.message);
                btn.disabled = false;
                btn.innerText = "Login with Email";
            }
        });

        // Google Login
        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            const btn = document.getElementById('googleSignInBtn');
            btn.disabled = true;
            
            try {
                const result = await signInWithPopup(auth, provider);
                await handleAuthResponse(result.user);
            } catch (error) {
                showError("Google Sign-in failed: " + error.message);
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
